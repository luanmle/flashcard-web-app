<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flashcards SRS{% endblock %}</title>
    <!-- daisyUI CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS CDN for MVP styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Safari */
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-base-200 min-h-screen text-base-content">
    <div class="navbar bg-primary text-primary-content shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/dashboard" class="btn btn-ghost text-xl font-bold">Flashcards SRS</a>
            <div>
                <!-- Simulated logged-in user context -->
                <div class="badge badge-secondary badge-outline mr-4 gap-2">
                    User: <span id="nav-user-id" class="font-mono text-xs font-bold"></span>
                </div>
            </div>
        </div>
    </div>

    <main class="container mx-auto p-4 md:p-8 mt-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        // MVP: Hardcode or read user_id from localStorage to simulate a logged-in session
        let currentUserId = localStorage.getItem('currentUserId');
        if (!currentUserId && window.location.pathname === '/dashboard') {
            // For MVP, if no user is set, we will rely on the dashboard logic to set one or show a prompt.
        } else if (currentUserId) {
            document.getElementById('nav-user-id').innerText = currentUserId.substring(0, 8) + '...';
        }
    </script>
</body>
</html>
